name: CFB Data Pipeline

on:
  schedule:
    - cron: '0 10 * * 1,3,5'  # Mon/Wed/Fri 10am UTC
  workflow_dispatch:

jobs:
  build-cfb-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-R-cfb-pipeline-v1
          restore-keys: |
            ${{ runner.os }}-R-cfb-pipeline-

      - name: Install R dependencies
        shell: Rscript {0}
        run: |
          pkgs <- c(
            "tidyverse", "cfbfastR", "jsonlite", "lubridate",
            "zoo", "data.table", "httr", "janitor", "stringr"
          )
          install.packages(pkgs[!pkgs %in% installed.packages()[,"Package"]],
                           repos = "https://cloud.r-project.org/")

      - name: Install gdown for Google Drive downloads
        run: pip install gdown

      - name: Create directories
        run: mkdir -p data output docs/data

      - name: Download historical data from Google Drive
        env:
          GDRIVE_PBP_ID: ${{ secrets.GDRIVE_PBP_ID }}
          GDRIVE_GAMES_ID: ${{ secrets.GDRIVE_GAMES_ID }}
          GDRIVE_GAMEDATA_ID: ${{ secrets.GDRIVE_GAMEDATA_ID }}
        run: |
          gdown --fuzzy "https://drive.google.com/uc?id=${GDRIVE_PBP_ID}" -O data/pbp_2014_2025.RDS
          gdown --fuzzy "https://drive.google.com/uc?id=${GDRIVE_GAMES_ID}" -O data/games_2014_2025.RDS
          gdown --fuzzy "https://drive.google.com/uc?id=${GDRIVE_GAMEDATA_ID}" -O data/CFB_GAMEDATA_2026_WEEK1.csv

      - name: Run CFB pipeline
        env:
          CFBD_API_KEY: ${{ secrets.CFBD_API_KEY }}
        run: Rscript scripts/cfb_data_pipeline.R

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ docs/data/
          if [[ -n $(git status -s) ]]; then
            git commit -m "Update CFB data $(date +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit"
          fi
