name: CFB Data Pipeline

on:
  workflow_dispatch:

jobs:
  build-cfb-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
          use-public-rspm: true

      - name: Install Linux system libs for R packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libcairo2-dev \
            libfontconfig1-dev \
            libgit2-dev

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::cfbfastR
            any::jsonlite
            any::lubridate
            any::zoo
            any::data.table
            any::janitor
            any::stringr
            any::rvest
            any::stringdist
            any::foreach
            any::doParallel
            any::future
            any::furrr
            any::readxl
          cache: true

      - name: Cache downloaded data files
        uses: actions/cache@v4
        with:
          path: data/*.RDS
          key: cfb-data-files-${{ hashFiles('**/cfb-data-pipeline.yml') }}
          restore-keys: |
            cfb-data-files-

      - name: Create directories
        run: mkdir -p data output docs/data

      - name: Install gdown for Google Drive downloads
        run: pip install gdown

      - name: Download historical data from Google Drive (if not cached)
        env:
          GDRIVE_PBP_ID: ${{ secrets.GDRIVE_PBP_ID }}
          GDRIVE_GAMES_ID: ${{ secrets.GDRIVE_GAMES_ID }}
          GDRIVE_GAMEDATA_ID: ${{ secrets.GDRIVE_GAMEDATA_ID }}
        run: |
          echo "Checking for cached files..."
          
          if [ ! -f "data/pbp_2014_2025.RDS" ]; then
            echo "Downloading PBP data..."
            gdown "https://drive.google.com/uc?id=${GDRIVE_PBP_ID}" -O data/pbp_2014_2025.RDS
          else
            echo "PBP data found in cache, skipping download"
          fi
          
          if [ ! -f "data/games_2014_2025.RDS" ]; then
            echo "Downloading Games data..."
            gdown "https://drive.google.com/uc?id=${GDRIVE_GAMES_ID}" -O data/games_2014_2025.RDS
          else
            echo "Games data found in cache, skipping download"
          fi
          
          if [ ! -f "data/CFB_GAMEDATA_2026_WEEK1.csv" ]; then
            echo "Downloading Historical Master..."
            gdown "https://drive.google.com/uc?id=${GDRIVE_GAMEDATA_ID}" -O data/CFB_GAMEDATA_2026_WEEK1.csv
          else
            echo "Historical Master found in cache, skipping download"
          fi
          
          echo "Verifying downloads..."
          ls -lh data/

      - name: Run CFB pipeline
        env:
          CFBD_API_KEY: ${{ secrets.CFBD_API_KEY }}
        run: |
          Rscript scripts/cfb_data_pipeline.R

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ docs/data/
          if [[ -n $(git status -s) ]]; then
            git commit -m "Update CFB data $(date +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit"
          fi
