name: Build 2026 QB CSV

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1"

permissions:
  contents: write

jobs:
  build-qb-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("nflreadr", "dplyr", "readr"), repos="https://cloud.r-project.org")'

      - name: Build 2026 QB CSV
        run: Rscript scripts/build_qb_names_2026.R

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add inst/extdata/qb_names_2026.csv
          if ! git diff --cached --quiet; then
            git commit -m "chore: update 2026 QB names CSV"
            git push
          else
            echo "No changes to commit"
          fi
