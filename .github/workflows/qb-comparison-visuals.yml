name: Generate QB comparison visuals

on:
  workflow_dispatch:
    inputs:
      output_dir:
        description: "Directory to write outputs into"
        required: false
        default: "outputs/qb_comparison"
        type: string
  schedule:
    - cron: "0 13 * * 2"

permissions:
  contents: write

concurrency:
  group: qb-comparison-visuals
  cancel-in-progress: false

jobs:
  build-qb-comparison:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Resolve run variables
        id: vars
        shell: bash
        run: |
          OUTPUT_DIR="${{ github.event.inputs.output_dir }}"
          if [ -z "$OUTPUT_DIR" ]; then
            OUTPUT_DIR="outputs/qb_comparison"
          fi
          echo "output_dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate comparison outputs
        run: |
          python scripts/qb_comparison_visuals.py --output-dir "${{ steps.vars.outputs.output_dir }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qb-comparison-outputs
          path: ${{ steps.vars.outputs.output_dir }}
          if-no-files-found: error

      - name: Commit generated outputs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${{ steps.vars.outputs.output_dir }}"

          if git diff --cached --quiet; then
            echo "No output changes to commit"
            exit 0
          fi

          git commit -m "Update QB comparison visuals"
          git push
