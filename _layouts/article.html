<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} | BTB Analytics</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; color: #1a1a1a; }
    nav { margin-bottom: 24px; font-size: 14px; }
    nav a { color: #0066cc; text-decoration: none; }
    nav a:hover { text-decoration: underline; }
    table { border-collapse: collapse; width: 100%; margin: 16px 0; }
    td, th { padding: 8px 12px; border: 1px solid #ddd; }
    th { background: #f5f5f5; font-weight: 600; }
    h1 { font-size: 1.6rem; margin-bottom: 8px; }
    h2 { font-size: 1.2rem; margin-top: 28px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
    img { max-width: 100%; }
    .week-label { color: #666; font-size: 14px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <nav><a href="{{ site.baseurl }}/">← All Matchups</a></nav>
  <span class="week-label">Week {{ page.week }} · {{ page.season }} Season</span>
  {{ content }}
</body>
</html>
