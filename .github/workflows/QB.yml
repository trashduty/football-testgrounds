name: Run 2025 QB starter inference

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas nfl_data_py pyarrow
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run QB starter script
        run: |
          python scripts/qb_starters_2025.py --output-dir outputs
          echo "Generated files:"
          find outputs -maxdepth 1 -type f | sort || true

      - name: Commit generated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          files=$(find outputs -maxdepth 1 -name "*.csv" -type f 2>/dev/null)
          if [ -z "$files" ]; then
            echo "No CSV files found in outputs/"
            exit 0
          fi

          git add outputs/*.csv
          git diff --cached --quiet && exit 0
          git commit -m "Add generated QB starter CSVs"
          git push
