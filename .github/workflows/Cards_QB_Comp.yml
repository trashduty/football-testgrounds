name: Cards QB comparison visuals

on:
  workflow_dispatch:
    inputs:
      output_dir:
        description: "Directory to write outputs into"
        required: false
        default: "outputs/qb_comparison"
        type: string
      brissett_season:
        description: "Season to use for Jacoby Brissett"
        required: false
        default: "2025"
        type: string
      minshew_season:
        description: "Season to use for Gardner Minshew"
        required: false
        default: "2024"
        type: string
  schedule:
    - cron: "0 13 * * 2"

permissions:
  contents: write

concurrency:
  group: qb-comparison-visuals
  cancel-in-progress: false

jobs:
  build-qb-comparison:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve run variables
        id: vars
        shell: bash
        run: |
          OUTPUT_DIR="${{ github.event.inputs.output_dir }}"
          BRISSETT_SEASON="${{ github.event.inputs.brissett_season }}"
          MINSHEW_SEASON="${{ github.event.inputs.minshew_season }}"

          if [ -z "$OUTPUT_DIR" ]; then
            OUTPUT_DIR="outputs/qb_comparison"
          fi

          if [ -z "$BRISSETT_SEASON" ]; then
            BRISSETT_SEASON="2025"
          fi

          if [ -z "$MINSHEW_SEASON" ]; then
            MINSHEW_SEASON="2024"
          fi

          echo "output_dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"
          echo "brissett_season=$BRISSETT_SEASON" >> "$GITHUB_OUTPUT"
          echo "minshew_season=$MINSHEW_SEASON" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas nfl_data_py matplotlib requests pillow pyarrow

      - name: Generate comparison outputs
        run: |
          python scripts/qb_comparison_visuals.py \
            --output-dir "${{ steps.vars.outputs.output_dir }}" \
            --brissett-season "${{ steps.vars.outputs.brissett_season }}" \
            --minshew-season "${{ steps.vars.outputs.minshew_season }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qb-comparison-outputs
          path: ${{ steps.vars.outputs.output_dir }}
          if-no-files-found: error

      - name: Commit generated outputs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${{ steps.vars.outputs.output_dir }}"

          if git diff --cached --quiet; then
            echo "No output changes to commit"
            exit 0
          fi

          git commit -m "Update QB comparison visuals"
          git push
